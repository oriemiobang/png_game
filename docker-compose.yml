version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: png_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-png_game}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./nestjs-backend
      dockerfile: Dockerfile
    container_name: png_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-png_game}?schema=public
      - JWT_SECRET=${JWT_SECRET:-fallback-secret-for-dev}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - PORT=3000
    ports:
      - "3000:3000"
    restart: always

volumes:
  postgres_data:
